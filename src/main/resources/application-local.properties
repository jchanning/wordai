# WordAI Local Linux Server Configuration (ZorinOS / AI-Server)
# Activated by: -Dspring.profiles.active=local
server.port=8080

# Dictionary Configuration - filesystem paths relative to working directory
dictionary.base.path=dictionaries
dictionary.file.name=5_letter_words.txt
dictionary.full.path=dictionaries/5_letter_words.txt
dictionary.fallback.paths=dictionaries/5_letter_words.txt

# Dictionary Options - All from filesystem
dictionaries.default.name=5 Letters
dictionaries.default.path=dictionaries/5_letter_words.txt
dictionaries.default.wordLength=5
dictionaries.default.description=5-letter word dictionary

dictionaries.easy.name=4 Letters
dictionaries.easy.path=dictionaries/4_letter_words.txt
dictionaries.easy.wordLength=4
dictionaries.easy.description=4-letter word dictionary

dictionaries.hard.name=6 Letters
dictionaries.hard.path=dictionaries/6_letter_words.txt
dictionaries.hard.wordLength=6
dictionaries.hard.description=6-letter word dictionary

# H2 Database - File-based for persistence
spring.datasource.url=jdbc:h2:file:/home/jchanning/wordai-data/wordai
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.platform=h2

# H2 Console - ENABLED for local testing (http://AI-Server:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway — schema migration manager
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# CORS — allow access from Windows test machine and local browser
wordai.cors.allowed-origins=${WORDAI_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://AI-Server:8080}

# Logging
logging.level.root=INFO
logging.level.com.fistraltech=INFO
logging.file.name=/home/jchanning/wordai-app/logs/wordai.log
logging.file.max-size=10MB
logging.file.max-history=5

# Session timeout (30 minutes)
server.servlet.session.timeout=30m

# Admin user seeding — credentials supplied via /etc/default/wordai
wordai.admin.email=${WORDAI_ADMIN_EMAIL}
wordai.admin.username=${WORDAI_ADMIN_USERNAME:admin}
wordai.admin.password=${WORDAI_ADMIN_PASSWORD}
wordai.admin.fullName=${WORDAI_ADMIN_FULLNAME:System Administrator}
