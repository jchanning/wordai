<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WordAI</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>WordAI</h1>
            <p id="form-subtitle">Sign in to continue</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <!-- Login Form -->
        <form id="loginForm" method="POST" action="/api/auth/login" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginEmail">Email or Username</label>
                <input type="text" id="loginEmail" name="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
            <button type="button" class="btn-secondary" onclick="window.location.href='/'">Cancel</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" required>
            </div>
            <div class="form-group">
                <label for="registerUsername">Username</label>
                <input type="text" id="registerUsername" required>
            </div>
            <div class="form-group">
                <label for="registerFullName">Full Name</label>
                <input type="text" id="registerFullName" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" minlength="6" required>
            </div>
            <div class="form-group">
                <label for="registerPasswordConfirm">Confirm Password</label>
                <input type="password" id="registerPasswordConfirm" minlength="6" required>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
            <button type="button" class="btn-secondary" onclick="window.location.href='/'">Cancel</button>
        </form>
        
        <div class="toggle-form">
            <span id="toggleText">Don't have an account?</span>
            <a href="#" onclick="toggleForm(event)">Sign up</a>
        </div>
    </div>
    
    <script>
        let isLoginMode = true;
        
        // Check for URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error')) {
            showError('Login failed. Please try again.');
        }
        if (urlParams.get('logout')) {
            showSuccess('You have been logged out successfully.');
        }
        
        function toggleForm(event) {
            event.preventDefault();
            isLoginMode = !isLoginMode;
            
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const subtitle = document.getElementById('form-subtitle');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = event.target;
            
            if (isLoginMode) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                subtitle.textContent = 'Sign in to continue';
                toggleText.textContent = "Don't have an account?";
                toggleLink.textContent = 'Sign up';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                subtitle.textContent = 'Create your account';
                toggleText.textContent = 'Already have an account?';
                toggleLink.textContent = 'Sign in';
            }
            
            clearMessages();
        }
        
        function handleLogin(event) {
            event.preventDefault();
            // Form will be submitted to /api/auth/login via Spring Security
            event.target.submit();
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            
            const email = document.getElementById('registerEmail').value;
            const username = document.getElementById('registerUsername').value;
            const fullName = document.getElementById('registerFullName').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
            
            if (password !== passwordConfirm) {
                showError('Passwords do not match');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        username,
                        fullName,
                        password
                    })
                });
                
                if (response.ok) {
                    showSuccess('Registration successful! Please sign in.');
                    setTimeout(() => {
                        toggleForm(new Event('click'));
                        document.getElementById('loginEmail').value = email;
                    }, 2000);
                } else {
                    const error = await response.json();
                    showError(error.error || 'Registration failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>

    <footer class="app-footer">
        <div class="footer-content">
            <div class="footer-copyright">
                © 2026 FistralTech Ltd
            </div>
            <nav class="footer-links" aria-label="Footer navigation">
                <a href="https://fistraltech.com" target="_blank" rel="noopener noreferrer" class="footer-link">fistraltech.com</a>
                <a href="/privacy.html" class="footer-link">Privacy Policy</a>
                <a href="/terms.html" class="footer-link">Terms of Service</a>
                <a href="/cookies.html" class="footer-link">Cookie Policy</a>
                <a href="/terms-sale.html" class="footer-link">Terms of Sale</a>
            </nav>
        </div>
    </footer>

</body>
</html>
